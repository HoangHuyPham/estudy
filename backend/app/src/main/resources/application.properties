spring.application.name=app
spring.profiles.active=dev

spring.datasource.url=jdbc:mysql://localhost:3306/estudy_db?createDatabaseIfNotExist=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=5GB
spring.servlet.multipart.file-size-threshold=1MB
spring.servlet.multipart.location=/tmp
server.tomcat.connection-timeout=300000

app.jwt.issuer=estudy
app.jwt.refresh-exp=864000
app.jwt.access-exp=600
app.mail.otp-exp=300
app.endpoint.client=http://localhost:5000
app.storage.root=/home/huypham/Desktop/Repo/Github/estudy/backend/app/storage
app.storage.root-uri=storage
app.storage.public-uri=public
app.storage.protected-uri=protected

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

server.port=5556

# Private info
spring.datasource.username=
spring.datasource.password=

app.jwt.key=
app.google.oauth2.client-id=
app.google.api.key=
app.cloudflare.secret-key=
app.cloudflare.verify-url=

spring.mail.username=
spring.mail.password=